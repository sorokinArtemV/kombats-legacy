# Chapter 4 — Phase C — capacity overlay.
#
# Adds two things absent from the base stack:
#   1. deploy.resources.limits on app + core infra services — so a
#      capacity-scan break is unambiguously "code pinned at its cap" vs
#      "one container ate the host".
#   2. Postgres started with `max_connections=300` (image default = 100).
#      4 services × pool 20 = 80 connections at single-replica; adding
#      Battle replicas crosses 100 fast. 300 gives headroom through
#      Stage 4 of the capacity scan.
#
# Limits were sized from a 25-simul `docker stats` baseline captured on a
# cold-start Mode A stack (PHASE_C_RESULTS.md §"docker stats baseline").
# Targets: memory ~3× observed-max, CPU ~4× observed-p95 — capped where
# the budget required (Battle and Postgres CPU). The intent is GENEROUS
# at low stages, PRESENT at high stages so a single-container ceiling is
# visible in `docker stats` during Phase D.
#
# Host budget (Docker Desktop on Apple Silicon, per RUNBOOK):
#   - CPU: 12 cores reported by `docker info`; ~6 cores usable headroom
#   - Memory: 7.75 GB reported; ~3 GB consumed by unlimited containers
#     (keycloak ~1.1 GB JVM, jaeger up to ~2.1 GB in-memory traces,
#     observability stack ~500 MB combined)
#
# Sum of limits set here:
#   CPU: 1.0+0.75+1.5+2.0+0.75 + 2.0+1.0+1.5 = 10.5 cores
#   Memory: 512+512+512+768+512 + 768+256+768 = 4608 MB
#
# This overlay is opt-in. Always merged ON TOP of the base + observability
# stack:
#
#   docker compose \
#     -f docker-compose.yml \
#     -f observability/docker-compose.observability.yml \
#     -f observability/docker-compose.observability.override.yml \
#     -f docker-compose.override.yml \
#     -f docker-compose.capacity.yml \
#     up -d --build
#
# Optionally append `-f docker-compose.capacity-replicas.yml` for
# N>1 Battle replicas (generated by scripts/generate-battle-replicas.py).

services:
  # ---- App services -----------------------------------------------------
  bff:
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  players:
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 512M

  matchmaking:
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 512M

  battle:
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 768M

  chat:
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 512M

  # ---- Core infrastructure ----------------------------------------------
  postgres:
    # max_connections=300: 4 services × pool 20 = 80 at single-replica;
    # Battle replicas (capacity-replicas.yml) cross the 100 default fast.
    # 300 gives headroom through Stage 4 without needing PgBouncer.
    command: postgres -c max_connections=300
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 768M

  redis:
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M

  rabbitmq:
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 768M
