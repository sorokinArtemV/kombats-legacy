global:
  scrape_interval: 5s
  evaluation_interval: 15s

scrape_configs:
  # The OTel Collector exposes its Prometheus exporter on :8889 with every
  # metric the .NET services emit (custom Kombats meters + AspNetCore +
  # HttpClient + Runtime + Process + MassTransit).
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]
