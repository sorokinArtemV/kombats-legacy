# OpenTelemetry Collector config for the Kombats local stack.
#
# Pipelines:
#   - traces   : OTLP in (services)  -> batch -> OTLP out to Jaeger
#   - metrics  : OTLP in (services)  -> batch -> Prometheus scrape endpoint (:8889)
#
# No logs pipeline yet — Serilog already emits to Console and Container Apps
# captures stdout to Log Analytics in the deployed env.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    # Tighter than the default 200ms so panels feel responsive at 5s refresh
    # without flooding Jaeger/Prometheus.
    timeout: 1s
    send_batch_size: 256

  # Surface the service.name resource attribute as a `service` label on every
  # Prometheus series so dashboards can split panels by service without doing
  # string surgery.
  resource:
    attributes:
      - key: service
        from_attribute: service.name
        action: upsert

exporters:
  # Forward all traces to Jaeger's OTLP receiver (enabled via COLLECTOR_OTLP_ENABLED).
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true

  # Prometheus scrape endpoint. Prometheus pulls from :8889.
  prometheus:
    endpoint: 0.0.0.0:8889
    # Use the service.name as `service` label (set by the resource processor).
    resource_to_telemetry_conversion:
      enabled: true

  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/jaeger]
    metrics:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [prometheus]

  telemetry:
    logs:
      level: info
